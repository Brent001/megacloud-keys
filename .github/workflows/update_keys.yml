name: Update key

on:
  schedule:
    - cron: "0 * * * *" # runs at minute 0 every hour
  workflow_dispatch:     # still allows manual runs if needed

permissions:
  contents: write

jobs:
  update_key:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes with rebase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git pull origin main --rebase

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run script to update key.txt
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
        run: node update_key.js

      - name: Commit and push updated files
        uses: EndBug/add-and-commit@v9
        with:
          add: "key.txt rabbit.txt"
          message: "Automated update of key"
          default_author: "github_actions"
          push: true
